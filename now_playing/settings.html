<div class="form-group">
    <label for="musicProvider" class="form-label">Music Provider:</label>
    <select id="musicProvider" name="musicProvider" class="form-input" onchange="updateTitleOptions(this.value)">
        <option value="Subsonic">Subsonic</option>
    </select>
</div>

<div class="form-group">
    <label for="url" class="form-label">Subsonic server URL:</label>
    <input type="text" id="url" name="url" placeholder="Type something..." required class="form-input">
</div>

<div class="form-group">
    <span style="color: var(--text-primary);">Warning: Do not run with untrusted URLs, as it may pose a security risk. This may also fail if the image takes too long to load.</span>
</div>

<div class="form-group">
    <label for="layout" class="form-label">Cover art grid layout:</label>
    <select id="coverArtGrid" name="coverLayout" class="form-input">
        <option value="fullScreen">Full Screen</option>
        <option value="largeGrid">Large Grid (6 most recent albums)</option>
        <option value="compactGrid">Compact Grid (15 most recent albums)</option>
    </select>
</div>

<div class="form-group">
    <label for="displayID3Metadata" class="form-label">Display song ID3 metadata:</label>
    <input type="checkbox" id="displayID3Metadata" name="displayID3Metadata" checked class="form-input">
</div>

<div>
    <label for="displayAudioFormatInfo" class="form-label">Display audio format information:</label>
    <input type="checkbox" id="displayAudioFormatInfo" name="displayAudioFormatInfo" class="form-input">
</div>

<div class="form-group">
    <label class="form-label">Star symbol:</label>
    <div class="form-group">
        <input type="radio" id="starSymbol_star" name="starSymbol" value="★" checked>
        <label for="starSymbolStar">Star: ★</label>
        <input type="radio" id="starSymbol_heart" name="starSymbol" value="♥">
        <label for="starSymbolHeart">Heart: ♥</label>
    </div>
</div>

<script>
    // populate form values from plugin settings
    document.addEventListener('DOMContentLoaded', () => {        
        if (loadPluginSettings) {
            document.getElementById('url').value = pluginSettings.url;
            document.getElementById('displayID3Metadata').checked = pluginSettings['displayID3Metadata'];
            document.getElementById('coverArtGrid').value = pluginSettings['coverLayout'];
            document.getElementById('displayAudioFormatInfo').checked = pluginSettings['displayAudioFormatInfo'];
            document.getElementById('starSymbol').value = pluginSettings['starSymbol'];
        }
    });
</script>
